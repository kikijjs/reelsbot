name: CI

on:
  push:
    branches: ["main", "claude/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Python lint + unit tests ──────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reelsbot
          POSTGRES_PASSWORD: reelsbot
          POSTGRES_DB: reelsbot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U reelsbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql+asyncpg://reelsbot:reelsbot@localhost:5432/reelsbot_test"
      REDIS_URL: "redis://localhost:6379/0"
      MEDIA_STORAGE_PATH: "/tmp/reelsbot_media"
      MEDIA_PUBLIC_BASE_URL: "http://localhost:8000/media"
      # CI 환경에서는 실제 AI API 키 없이 mock 테스트만 실행
      GEMINI_API_KEY: "ci-dummy-key"
      ANTHROPIC_API_KEY: "ci-dummy-key"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt ruff black pytest pytest-asyncio

      - name: Lint — ruff
        run: ruff check . --exclude=alembic/

      - name: Lint — black (format check)
        run: black --check . --exclude="/(alembic|mobile|dashboard\/web)/"

      - name: Run DB migration
        run: alembic upgrade head

      - name: Unit tests — collector
        run: python test_collector.py

      - name: Unit tests — processor
        run: python test_processor.py

      - name: Unit tests — editor
        run: python test_editor.py

      - name: Unit tests — publisher
        run: python test_publisher.py

      - name: Unit tests — dashboard
        run: python test_dashboard.py

  # ── React 웹 프론트엔드 빌드 ───────────────────────────────────────────────
  frontend:
    name: Frontend (build check)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_API_BASE_URL: "http://localhost:8000"
        run: npm run build

  # ── 모든 체크 통과 확인 (branch protection용) ─────────────────────────────
  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - run: echo "✅ All CI checks passed"
