version: "3.9"

services:
  # ── 인프라 ────────────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reelsbot
      POSTGRES_PASSWORD: reelsbot
      POSTGRES_DB: reelsbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelsbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── DB 마이그레이션 (1회 실행 후 종료) ───────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://reelsbot:reelsbot@db:5432/reelsbot"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── FastAPI 백엔드 ────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["uvicorn", "dashboard.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://reelsbot:reelsbot@db:5432/reelsbot"
      REDIS_URL: "redis://redis:6379/0"
      MEDIA_STORAGE_PATH: "/app/media"
      MEDIA_PUBLIC_BASE_URL: "http://localhost:8000/media"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery 워커 ───────────────────────────────────────────────────────────

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command:
      - "celery"
      - "-A"
      - "publisher.celery_app"
      - "worker"
      - "--loglevel=info"
      - "--concurrency=4"
      - "--pool=threads"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://reelsbot:reelsbot@db:5432/reelsbot"
      REDIS_URL: "redis://redis:6379/0"
      MEDIA_STORAGE_PATH: "/app/media"
      MEDIA_PUBLIC_BASE_URL: "http://api:8000/media"
    volumes:
      - media_data:/app/media
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (스케줄러) ────────────────────────────────────────────────

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command:
      - "celery"
      - "-A"
      - "publisher.celery_app"
      - "beat"
      - "--loglevel=info"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://reelsbot:reelsbot@db:5432/reelsbot"
      REDIS_URL: "redis://redis:6379/0"
      MEDIA_STORAGE_PATH: "/app/media"
    depends_on:
      worker:
        condition: service_started
    restart: unless-stopped

  # ── React 웹 대시보드 ─────────────────────────────────────────────────────

  web:
    build:
      context: ./dashboard/web
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
